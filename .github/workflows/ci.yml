name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci
      - run: npm run build
      - run: npm test

  publish:
    name: Publish
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - run: npm install -g npm@latest  # OIDC trusted publishing requires npm >= 11.5.1
      - run: npm ci

      - name: Set version
        env:
          RUN_NUMBER: ${{ github.run_number }}
        run: npm version "1.0.${RUN_NUMBER}" --no-git-tag-version

      # npm detects ACTIONS_ID_TOKEN_REQUEST_TOKEN in the environment and exchanges
      # the GitHub OIDC token for a granular npm publish token automatically.
      # No NPM_TOKEN secret needed.
      #
      # One-time setup required on npmjs.com before first automated publish:
      #   @sirrlock/n8n-nodes-sirr → Settings → Publishing → Trusted Publishers
      #   Repository: sirrlock/n8n-nodes-sirr   Workflow: ci.yml   Environment: (none)
      - name: Publish to npm
        run: npm publish --provenance --access public
